services:
  c3:
    build: .
    image: c3-py:latest
    container_name: c3
    stdin_open: true
    tty: true
    volumes:
      - ./data:/data
      - ./claude-auth:/home/c3/.claude
    environment:
      - C3_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "test", "-f", "/data/sessions/creds.json"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
