# ── Prerequisites check ─────────────────────────────────────────────────────
prereqs:
  checks:
    - cmd: node
      missing: "Node.js not found — install 18+ from nodejs.org"
    - cmd: claude
      missing: "Claude Code CLI not found"
    - cmd: npm
      missing: "npm not found"
  node_too_old: "Node.js too old — need {min_version}+"

# ── CLI prompts ──────────────────────────────────────────────────────────────
prompts:
  app_new: "Create c3 app '{name}': {description}. Read c3://schema/app. Generate CLAUDE.md, update app.json, create skills in {name}/skills/. Use save_file."
  review_skill: "Review {app}/skills/{file}. Check {rules}. Rewrite with save_file if needed."
  review_prompt: "Review {app}/CLAUDE.md. Check {rules}. Rewrite with save_file if needed."
  gen_skill: "Generate skill for '{app}': {source}. Follow {rules}. Save to {app}/skills/ with save_file."
  gen_prompt: "Generate CLAUDE.md for '{app}': {source}. Save to {app}/CLAUDE.md with save_file."
  mcp_added: "MCP '{server}' added to '{app}'. Update {app}/app.json allowed_tools with save_file."

rules: "rules (reply via MCP, polls for choices, memory for persistence)"

check_files:
  - [config.json, "no hosts configured"]
  - [app.json, "using default RBAC"]
  - [CLAUDE.md, "no custom instructions"]

# ── Tool definitions (JSON Schema) ──────────────────────────────────────────
tools:
  - name: reply
    description: Send a message to a user or group.
    properties:
      jid: {type: string, description: "Token: 'host', 'group', or a name"}
      text: {type: string}
    required: [jid, text]

  - name: send_private
    description: Send a private DM.
    properties:
      jid: {type: string}
      text: {type: string}
    required: [jid, text]

  - name: send_poll
    description: Send a single-choice WhatsApp poll.
    properties:
      group_jid: {type: string}
      question: {type: string}
      options: {type: array, items: {type: string}, minItems: 2, maxItems: 12}
    required: [group_jid, question, options]

  - name: get_group_members
    description: Get the member list of a WhatsApp group.
    properties:
      group_jid: {type: string}
    required: [group_jid]

  - name: resolve_group
    description: Resolve a WhatsApp invite link to a group JID.
    properties:
      invite_link: {type: string, description: "https://chat.whatsapp.com/..."}
    required: [invite_link]

  - name: set_timer
    description: Start a named countdown.
    properties:
      seconds: {type: number}
      name: {type: string, description: Timer label}
      group_jid: {type: string, description: Optional group context}
    required: [seconds, name]

  - name: end_session
    description: End the active session.
    properties:
      group_jid: {type: string, description: "Optional — clears specific group, or all if omitted"}

  - name: memory_write
    description: Store an entity in persistent memory.
    properties:
      entity: {type: object, description: "Must include 'app' and 'entity' fields"}
    required: [entity]

  - name: memory_read
    description: Read entities from memory.
    properties:
      app: {type: string, description: Filter by app name}
      entity_type: {type: string, description: Filter by entity type}

  - name: memory_search
    description: Full-text search across all memory.
    properties:
      query: {type: string}
    required: [query]

  - name: memory_delete
    description: Delete matching entities from memory.
    properties:
      app: {type: string}
      entity_type: {type: string}
      name: {type: string}

  - name: send_image
    description: Send an image file.
    properties:
      jid: {type: string, description: "Token: 'host', 'group', or a name"}
      path: {type: string, description: Absolute path to file}
      caption: {type: string, description: Optional caption}
    required: [jid, path]

  - name: send_audio
    description: Send an audio file or voice note.
    properties:
      jid: {type: string, description: "Token: 'host', 'group', or a name"}
      path: {type: string, description: Absolute path to file}
      ptt: {type: boolean, description: Voice note}
    required: [jid, path]

  - name: send_video
    description: Send a video file.
    properties:
      jid: {type: string, description: "Token: 'host', 'group', or a name"}
      path: {type: string, description: Absolute path to file}
      caption: {type: string, description: Optional caption}
    required: [jid, path]

  - name: send_document
    description: Send a document/file.
    properties:
      jid: {type: string, description: "Token: 'host', 'group', or a name"}
      path: {type: string, description: Absolute path to file}
      filename: {type: string, description: Display filename}
      mimetype: {type: string, description: MIME type}
    required: [jid, path]

  - name: react
    description: React to a message with an emoji.
    properties:
      jid: {type: string, description: "Token: 'host', 'group', or a name"}
      message_id: {type: string, description: Message ID}
      emoji: {type: string, description: Emoji}
    required: [jid, message_id, emoji]

  - name: load_app
    description: Load an app's skills and MCP tools on demand.
    properties:
      name: {type: string, description: App name or skill name}
    required: [name]

  - name: save_file
    description: Write content to a file in the data directory.
    properties:
      path: {type: string, description: Relative path}
      content: {type: string}
    required: [path, content]
